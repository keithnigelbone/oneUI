name: flutter_sample
description: External One UI Flutter sample — vendored ui_flutter tarball, login screen demo.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10+1
  # Monorepo dev: path to package. External tarball: path: vendor/ui_flutter
  ui_flutter:
    path: ../../packages/ui_flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/products/
    - assets/peoplefirst/homepage-banner.svg
